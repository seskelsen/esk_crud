<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Sistema de Gestão de Fornecedores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-bg">
    <div class="container">
        <div class="row justify-content-center min-vh-100 align-items-center">
            <div class="col-md-6 col-lg-5">
                <div class="login-card card shadow-lg border-0">
                    <div class="card-body p-5">
                        <div class="text-center mb-5">
                            <div class="login-icon-wrapper mb-4">
                                <i class="bi bi-person-plus display-3 text-primary"></i>
                            </div>
                            <h2 class="login-title mb-2">Criar conta</h2>
                            <p class="login-subtitle text-muted">Preencha os dados para se registrar</p>
                        </div>
                        <form id="registerForm" class="needs-validation" novalidate>
                            <div class="mb-3">
                                <label for="username" class="form-label fw-semibold">Usuário</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="bi bi-person-fill text-primary"></i>
                                    </span>
                                    <input type="text" class="form-control form-control-lg border-start-0 ps-0" id="username" placeholder="Escolha um usuário" required>
                                    <div class="invalid-feedback">Usuário é obrigatório</div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Email</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="bi bi-envelope-fill text-primary"></i>
                                    </span>
                                    <input type="email" class="form-control form-control-lg border-start-0 ps-0" id="email" placeholder="Digite seu email" required>
                                    <div class="invalid-feedback">Email válido é obrigatório</div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">Senha</label>
                                <div class="input-group">
                                    <input type="password" class="form-control form-control-lg" id="password" placeholder="Crie uma senha" required>
                                    <button
                                        class="btn btn-outline-secondary password-toggle-btn border-start-0"
                                        type="button"
                                        data-target="password"
                                        aria-label="Mostrar senha"
                                    >
                                        <i class="bi bi-eye"></i>
                                    </button>
                                    <div class="invalid-feedback">Senha é obrigatória</div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="confirmPassword" class="form-label fw-semibold">Confirmar Senha</label>
                                <div class="input-group">
                                    <input type="password" class="form-control form-control-lg" id="confirmPassword" placeholder="Confirme sua senha" required>
                                    <button
                                        class="btn btn-outline-secondary password-toggle-btn border-start-0"
                                        type="button"
                                        data-target="confirmPassword"
                                        aria-label="Mostrar confirmação de senha"
                                    >
                                        <i class="bi bi-eye"></i>
                                    </button>
                                    <div class="invalid-feedback">Confirmação de senha é obrigatória</div>
                                </div>
                            </div>

                            <div id="register-inline-error" class="form-inline-error" role="alert" aria-live="polite"></div>

                            <button id="register-submit-btn" type="submit" class="btn btn-primary btn-lg w-100 mb-4 login-btn">
                                <span class="btn-text">
                                    <i class="bi bi-box-arrow-in-right me-2"></i>Registrar
                                </span>
                                <span class="btn-spinner d-none">
                                    <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                                    Registrando...
                                </span>
                            </button>
                        </form>

                        <div class="text-center">
                            <p class="mb-0 text-muted">Já tem uma conta?
                                <a href="login.html" class="text-primary fw-semibold text-decoration-none">Faça login</a>
                            </p>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <small class="text-muted">Sistema de Gestão de Fornecedores &copy; 2025</small>
                </div>
    <div id="loading-overlay" class="position-fixed top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center hide" style="z-index: 9999; background-color: rgba(255, 255, 255, 0.8);">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Carregando...</span>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/register.js"></script>
</body>
</html>
